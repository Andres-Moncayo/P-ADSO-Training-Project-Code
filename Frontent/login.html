<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | SENA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/loginstyle.css">
</head>
<body>
    <div class="login-container ">
        <div class="login-header">
            <h1>Bienvenido a la plataforma de Gestión Administrativa del SENA</h1>
            <p>Por favor, inicia sesión para continuar</p>
        </div>
        
        <div class="login-form">
            <form id="loginForm">
                <div class="alert alert-danger" role="alert" style="display: none;" id="error-message"></div>
                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="Ingresa tu correo electrónico" required>
                    <div class="error-message" id="emailError">Por favor ingresa un correo válido</div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="inputPassword" placeholder="Ingresa tu contraseña" required>
                        <span class="input-group-text" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="error-message" id="passwordError">La contraseña debe tener al menos 6 caracteres</div>
                </div>
                
                <div class="forgot-password">
                    <a href="#" id="forgotPassword">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn-login" id="login">
                    <span>Iniciar Sesión</span>
                    <span id="buttonLoader" class="loader" style="display: none;"></span>
                </button>
                
                <div class="success-message" id="successMessage">¡Inicio de sesión exitoso!</div>
                <div class="error-message" id="generalError">Credenciales incorrectas. Por favor intenta de nuevo.</div>
            </form>
            <script>
                const boton = document.getElementById("login");

                boton.addEventListener("click", (event) => {
                    event.preventDefault();

                    const loginUrl = "http://127.0.0.1:8000/access/token";

                    let correo = document.getElementById("inputEmail").value;
                    let contrasenia = document.getElementById("inputPassword").value;

                    const formData = new URLSearchParams();
                    formData.append("username", correo);
                    formData.append("password", contrasenia);

                    fetch(loginUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded",
                            "accept": "application/json"
                        },
                        body: formData
                    })
                    .then(response => {
                        if (!response.ok) {
                            return response.json().then(err => { throw err });
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log("Login exitoso:", data);

                        // Guardar token
                        localStorage.setItem("access_token", data.access_token);
            
                        // Guardar información del usuario en localStorage (convertida a JSON)
                        localStorage.setItem("user", JSON.stringify(data.user));

                        // Redirigir después del login
                        window.location.href = "index.html";
                    })
                    .catch(error => {
                        console.error("Error en login:", error);
                        const mensaje = document.getElementById("error-message");
                        mensaje.style.display = "block";
                        mensaje.innerHTML = error.detail;
                    });
                });
            </script>

        </div>
    </div>
</body>
</html>
